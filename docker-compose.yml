# MusicD Shortcuts — self-hosted Roon extension
#
# HOST NETWORKING IS REQUIRED.
#   Roon Core discovery uses UDP broadcast (the `sood` module). A bridged
#   Docker network will NOT receive those broadcasts, so the extension would
#   never find or pair with your Core. `network_mode: host` puts the container
#   directly on your LAN so discovery + pairing work. With host networking the
#   app listens on PORT (default 3000) directly on the host — published/mapped
#   ports are ignored, so there is no `ports:` section here.
#   (Host networking is a Linux feature; on Docker Desktop for macOS/Windows it
#   is not fully supported.)
#
# SET PUBLIC_BASE_URL.
#   The dashboard and Roon settings show webhook URLs for you to paste into iOS
#   Shortcuts. Those URLs must be reachable from your iPhone, so set
#   PUBLIC_BASE_URL to this server's LAN address, e.g.
#     PUBLIC_BASE_URL=http://192.168.1.50:3000
#   If left unset the app auto-detects a LAN IP, which usually works but pin it
#   explicitly if the shown URLs are wrong.
#
# Usage:  docker compose up -d   (then pair in Roon → Settings → Extensions)

services:
  musicd-shortcuts:
    build: .
    image: musicd-shortcuts:latest
    container_name: musicd-shortcuts
    network_mode: host
    restart: unless-stopped
    volumes:
      - musicd-shortcuts-data:/data
    environment:
      DATA_DIR: /data
      PORT: "3000"
      # Passed through from your shell if set, e.g.
      #   PUBLIC_BASE_URL=http://192.168.1.50:3000 docker compose up -d
      # so the webhook URLs are reachable from your iPhone. Left empty, the
      # app auto-detects a LAN IP (which usually works). You can also just
      # hard-code your IP here instead of using the shell variable.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}

volumes:
  musicd-shortcuts-data:
